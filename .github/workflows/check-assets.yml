name: Refresh laravel.com docs assets

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: check-assets
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: demo/package-lock.json

      - name: NPM install
        working-directory: demo
        run: npm ci

      - name: Sync laravel.com docs CSS + fonts
        working-directory: demo
        run: npm run sync:assets

      - name: Detect changes
        id: diff
        working-directory: demo
        run: |
          git add public/laravel-docs.css public/laravel-docs-assets
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --cached --stat
          fi

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: |
            demo/public/laravel-docs.css
            demo/public/laravel-docs-assets/**
          branch: chore/refresh-laravel-docs-assets
          commit-message: 'chore: refresh laravel.com docs CSS + font hashes'
          title: 'chore: refresh laravel.com docs CSS + font hashes'
          body: |
            laravel.com rotated its CSS hash or font filenames. This PR
            updates `demo/public/laravel-docs.css` and any matching font
            files under `demo/public/laravel-docs-assets/`.

            Generated by `.github/workflows/check-assets.yml`.
          delete-branch: true
