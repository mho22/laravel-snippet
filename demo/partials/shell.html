<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>{{title}} — Laravel snippet demo</title>
	<link rel="preconnect" href="https://fonts.bunny.net">
	<link rel="stylesheet" href="https://fonts.bunny.net/css?family=ibm-plex-mono:500|merriweather:400&display=swap">
	<!-- laravel.com's compiled Tailwind. The hash rotates each deploy; if styles
	     vanish, re-run tools/visual-diff/extract-chrome.mjs (after re-curling
	     /tmp/laravel-collections-raw.html) and re-grep `app-…\.css`. -->
	<link rel="stylesheet" href="https://laravel.com/build/assets/app-CnB2ccKA.css">
	<script>{{theme_fouc}}</script>
	<style>{{snippet_css}}</style>
	<script type="module" src="/src/snippet.js"></script>
	<script type="module" src="/src/theme.js"></script>
</head>
<body class="bg-white font-sans text-neutral-900 antialiased dark:text-neutral-100 dark:bg-neutral-900">
{{header}}
<div class="mx-auto max-w-[1400px] border-l border-neutral-200 dark:border-neutral-700">
	<div class="px-4 xl:px-16">
		<div id="docsScreen" class="grid grid-cols-12 gap-4 px-6 pt-10 lg:gap-6 lg:px-0 xl:gap-x-10">
{{sidebar}}
			<section class="col-span-12 lg:col-span-9 xl:col-span-6">
				<section class="docs_main max-w-prose">
					<div id="main-content" class="contains-code-blocks">
{{content}}
					</div>
				</section>
			</section>
{{right_rail}}
		</div>
	</div>
</div>
</body>
</html>
